<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Analyzer</title>
  <link rel="manifest" href="/static/manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.__INITIAL_PAGE__ = {{ page|tojson }};
    window.__INITIAL_DATA__ = {{ initial_data|tojson }};
    window.__FLASH_MESSAGES__ = {{ flashes|tojson }};
    window.__USER_EMAIL__ = {{ user_email|tojson }};
    window.__NAV_LINKS__ = {{ nav_links|tojson }};
    window.__LOGOUT_URL__ = {{ logout_url|tojson }};
  </script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>

  <!-- PERF FIX #1: Production minified builds (NOT .development.js) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>

  <!-- PERF FIX #2: Pre-compiled JS — Babel no longer transpiles in browser at runtime.
       Run: npx babel static/js/reactApp.jsx -o static/js/reactApp.js
       (one-time or in CI) to generate this file. -->
  <script src="{{ url_for('static', filename='js/reactApp.js') }}"></script>
</body>
</html>
