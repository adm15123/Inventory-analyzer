<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Analyzer</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#1e293b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Dark mode overrides ─────────────────────────────────────────── */
    html.dark body,
    html.dark .min-h-screen { background-color: #0f172a; }
    html.dark .bg-white { background-color: #1e293b !important; }
    html.dark .bg-slate-50 { background-color: #162032 !important; }
    html.dark .bg-slate-100 { background-color: #0f172a !important; }
    html.dark .bg-slate-200 { background-color: #334155 !important; }
    html.dark nav.sticky { background-color: #1e293b !important; border-color: #334155 !important; }
    html.dark .text-slate-900 { color: #f1f5f9 !important; }
    html.dark .text-slate-800 { color: #e2e8f0 !important; }
    html.dark .text-slate-700 { color: #cbd5e1 !important; }
    html.dark .text-slate-600 { color: #94a3b8 !important; }
    html.dark .text-slate-500 { color: #64748b !important; }
    html.dark .text-slate-400 { color: #475569 !important; }
    html.dark .border-slate-100 { border-color: #1e293b !important; }
    html.dark .border-slate-200 { border-color: #334155 !important; }
    html.dark .border-slate-300 { border-color: #475569 !important; }
    html.dark .divide-slate-50 > * + *,
    html.dark .divide-slate-100 > * + *,
    html.dark .divide-y > * + * { border-color: #1e293b !important; }
    html.dark .ring-slate-200 { --tw-ring-color: #334155 !important; }
    html.dark input:not([type="checkbox"]):not([type="radio"]),
    html.dark select,
    html.dark textarea {
      background-color: #1e293b !important;
      color: #e2e8f0 !important;
      border-color: #475569 !important;
    }
    html.dark input::placeholder,
    html.dark textarea::placeholder { color: #64748b !important; }
    html.dark .hover\:bg-slate-100:hover { background-color: #334155 !important; }
    html.dark .hover\:bg-slate-50:hover { background-color: #1e293b !important; }
    html.dark .hover\:bg-sky-50:hover { background-color: #0c4a6e !important; }
    html.dark .bg-sky-50 { background-color: #0c4a6e !important; }
    html.dark .text-sky-700 { color: #38bdf8 !important; }
    html.dark .shadow-sm { --tw-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.4) !important; }
  </style>
  <script>
    /* Restore dark mode before React paints — prevents white flash */
    (function () {
      try { if (localStorage.getItem('zamora_dark') === '1') document.documentElement.classList.add('dark'); }
      catch (e) {}
    })();
  </script>
  <script>
    window.__INITIAL_PAGE__ = {{ page|tojson }};
    window.__INITIAL_DATA__ = {{ initial_data|tojson }};
    window.__FLASH_MESSAGES__ = {{ flashes|tojson }};
    window.__USER_EMAIL__ = {{ user_email|tojson }};
    window.__NAV_LINKS__ = {{ nav_links|tojson }};
    window.__LOGOUT_URL__ = {{ logout_url|tojson }};
  </script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>

  <!-- PERF FIX #1: Production minified builds (NOT .development.js) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>

  <!-- jsPDF + autoTable (PDF export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- Babel (compiles JSX in browser — remove once reactApp.js is built via GitHub Actions) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- JSX source -->
  <script
    type="text/babel"
    data-presets="env,react"
    data-plugins="proposal-class-properties,proposal-object-rest-spread,proposal-nullish-coalescing-operator,proposal-optional-chaining"
    src="{{ url_for('static', filename='js/reactApp.jsx') }}"
  ></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/service-worker.js');
    }
  </script>
</body>
</html>
