<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Login Code — Zamora Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm mx-4">
    <div class="bg-slate-800 rounded-2xl shadow-xl p-8">
      <h1 class="text-2xl font-bold text-white mb-1 text-center">Check your email</h1>
      <p class="text-slate-400 text-sm text-center mb-6">
        We sent a 6-digit code to <span class="text-slate-200 font-medium">{{ email }}</span>.
        It expires in 10 minutes.
      </p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
            {% if category == 'danger' %}bg-red-900/60 text-red-300 border border-red-700
            {% elif category == 'warning' %}bg-yellow-900/60 text-yellow-300 border border-yellow-700
            {% else %}bg-blue-900/60 text-blue-300 border border-blue-700{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('verify_code') }}">
        <label class="block text-slate-300 text-sm font-medium mb-2" for="code">
          Login Code
        </label>
        <input
          id="code"
          name="code"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          maxlength="6"
          placeholder="123456"
          autofocus
          required
          class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600
                 text-white placeholder-slate-500 text-lg tracking-widest text-center
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                 mb-5"
        />
        <button
          type="submit"
          class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-500 active:bg-blue-700
                 text-white font-semibold transition-colors"
        >
          Verify Code
        </button>
      </form>

      <p class="text-center mt-5">
        <a href="{{ url_for('login') }}" class="text-slate-400 hover:text-slate-200 text-sm transition-colors">
          &larr; Back to login
        </a>
      </p>
    </div>
  </div>
</body>
</html>
